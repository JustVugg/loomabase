events {}

http {
    limit_req_zone $binary_remote_addr zone=loomabase_sync:10m rate=20r/s;

    upstream loomabase {
        server loomabase:8080;
        keepalive 32;
    }

    server {
        listen 443 ssl http2;
        server_name sync.example.com;
        client_max_body_size 5m;

        ssl_certificate /etc/nginx/tls/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location = /sync {
            limit_req zone=loomabase_sync burst=40 nodelay;
            proxy_pass http://loomabase;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Device-Id $http_x_device_id;
            proxy_read_timeout 35s;
        }

        location = /health {
            proxy_pass http://loomabase;
        }

        location = /metrics {
            allow 10.0.0.0/8;
            deny all;
            proxy_pass http://loomabase;
        }
    }
}
